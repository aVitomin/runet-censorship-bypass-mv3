name: Build Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
        
    - name: Install extension dependencies
      run: |
        cd extensions/chromium/runet-censorship-bypass
        if [ -f package.json ]; then
          echo "Installing extension dependencies..."
          npm install
        else
          echo "No package.json found in extension directory"
        fi
    
    - name: Build extension
      run: |
        cd extensions/chromium/runet-censorship-bypass
        echo "Building extension..."
        if [ -f "node_modules/.bin/gulp" ]; then
          ./node_modules/.bin/gulp buildAll || ./node_modules/.bin/gulp build
        else
          echo "Gulp not found, trying npx..."
          npx gulp buildAll || npx gulp build
        fi
    
    - name: Verify build
      run: |
        echo "Checking build output..."
        if [ -d "extensions/chromium/runet-censorship-bypass/dist" ] || [ -d "extensions/chromium/runet-censorship-bypass/build" ]; then
          echo "Build successful!"
        else
          echo "Build output not found in expected locations"
          find extensions/chromium/runet-censorship-bypass -name "*.js" -o -name "*.html" -o -name "manifest.json" | head -10
        fi

    - name: Upload Full Version
      uses: actions/upload-artifact@v4
      with:
        name: runet-censorship-bypass-extension-full
        path: extensions/chromium/runet-censorship-bypass/build/extension-full
        retention-days: 7

    - name: Upload Mini Version
      uses: actions/upload-artifact@v4
      with:
        name: runet-censorship-bypass-extension-mini
        path: extensions/chromium/runet-censorship-bypass/build/extension-mini
        retention-days: 7

    - name: Upload Beta Version
      uses: actions/upload-artifact@v4
      with:
        name: runet-censorship-bypass-extension-beta
        path: extensions/chromium/runet-censorship-bypass/build/extension-beta
        retention-days: 7